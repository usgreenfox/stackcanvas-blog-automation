name: WordPress issue publisher (manual)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
      action:
        description: 'approved | needs_changes | publish_ok'
        required: true
        default: approved

jobs:
  dry_run:
    runs-on: ubuntu-latest
    steps:
      - name: Show inputs
        run: |
          echo "issue: ${{ github.event.inputs.issue_number }}"
          echo "action: ${{ github.event.inputs.action }}"
          echo "WP_URL: ${{ secrets.WP_URL }}"
      - name: Fetch issue JSON
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.inputs.issue_number }} \
            > issue.json
          head -n 40 issue.json
      - name: Print note (next step uses WP_APP_PASSWORD)
        run: |
          echo "This workflow currently only validates inputs and fetches issue JSON."
          echo "Next step would call WordPress REST API using WP_USER/WP_APP_PASSWORD to create/update/ schedule posts."
