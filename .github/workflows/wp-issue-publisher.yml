name: WordPress issue publisher
permissions:
  issues: write
  contents: read

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
      action:
        description: approved | needs_changes | publish_ok
        required: true
        default: approved

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Determine action/issue
        id: ctx
        run: |
          echo "action=${{ github.event_name == 'issues' && (github.event.label.name == 'approved' || github.event.label.name == 'needs_changes' || github.event.label.name == 'publish_ok') && github.event.label.name || github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          echo "issue=${{ github.event_name == 'issues' && github.event.issue.number || github.event.inputs.issue_number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/wp_issue_publisher.sh

      - name: Run publisher
        if: steps.ctx.outputs.action != ''
        run: scripts/wp_issue_publisher.sh
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ steps.ctx.outputs.issue }}
          ACTION: ${{ steps.ctx.outputs.action }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
